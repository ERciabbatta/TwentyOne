name: twentyone

description: "TwentyOne - Costruisci nuove abitudini in 21 giorni di costanza."

publish_to: "none"

version: 1.3.0+1

environment:
  sdk: ^3.11.0-207.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  table_calendar: ^3.2.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  firebase_core: ^3.6.0
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "lib/assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
